name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build WAR
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            maven:3.9-openjdk-8 \
            mvn package -DskipTests

      - name: Deploy WAR
        run: |
          cp ${{ github.workspace }}/target/*.war /home/dev/wooribat-1.0.0.war
          docker restart woori-app
