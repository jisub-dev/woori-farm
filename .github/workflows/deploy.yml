name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Fix workspace permissions
        run: |
          docker run --rm -v "${{ github.workspace }}":/work alpine chown -R $(id -u):$(id -g) /work || true

      - uses: actions/checkout@v4

      - name: Inject oauth.properties
        run: |
          cat > ${{ github.workspace }}/src/main/resources/oauth.properties << 'EOF'
          ${{ secrets.OAUTH_PROPERTIES }}
          EOF

      - name: Build WAR
        run: |
          mkdir -p /home/dev/.m2
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v ${{ github.workspace }}:/app \
            -v /home/dev/.m2:/tmp/.m2 \
            -w /app \
            maven:3.8-openjdk-11 \
            mvn package -DskipTests -Dmaven.repo.local=/tmp/.m2

      - name: Deploy WAR
        run: |
          cp ${{ github.workspace }}/target/*.war /home/dev/wooribat-1.0.0.war
          docker restart woori-app
